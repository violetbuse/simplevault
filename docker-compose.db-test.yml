services:
  postgres:
    image: postgres:16-alpine
    container_name: simplevault-db-test
    environment:
      POSTGRES_USER: simplevault
      POSTGRES_PASSWORD: simplevault
      POSTGRES_DB: simplevault_test
    ports:
      - "${SIMPLEVAULT_TEST_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplevault -d simplevault_test"]
      interval: 2s
      timeout: 2s
      retries: 20
